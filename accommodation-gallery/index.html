<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gallery Skibuss</title>
    <link rel="stylesheet" href="gallery.css">
    <script src="gallery.js" defer></script>
</head>

<body>
    <div class="skibuss-gallery">
        <h1>Gallerie</h1>
        <section>
            <h2>Haus & Ankunft</h2>
            <div class="images">
                <img src="img/1-house-front.jpeg">
                <img src="img/1-staircase.jpeg">
            </div>
        </section>
        <section>
            <h2>Gemeinschafts- und Essbereiche</h2>
            <div class="images">
                <img src="img/2-floor1_dining-hall.jpg">
                <img src="img/2-floor2_living-dining-room-wide.jpg">
                <img src="img/2-floor2_living-dining-sofa-green-bed.jpeg">
                <img src="img/2-floor2_living-dining-table-corner.jpeg">
            </div>
        </section>
        <section>
            <h2>Schlafzimmer</h2>
            <div class="images">
                <img src="img/3-floorx_bedroom-family-wide.jpg">
                <img src="img/3-floorx_bedroom-twin-beds.jpeg">
                <img src="img/3-floorx_bedroom-two-beds.jpg">
                <img src="img/3-floorx_bedroom-wood-panel-ceiling.jpeg">
            </div>
        </section>
        <section>
            <h2>Küchen & Bäder</h2>
            <div class="images">
                <img src="img/4-floor1_bathroom-shower-sink.jpeg">
                <img src="img/4-floor1_kitchen-wide.jpg">
                <img src="img/4-floor2_bathroom-bathtub-and-toilet.jpeg">
                <img src="img/4-floor2_kitchen-counter-and-sink.jpeg">
            </div>
        </section>
        <section>
            <h2>Grundrisse & Raumaufteilung</h2>
            <div class="images">
                <img src="img/5-apartment-floor-plan-1.jpg">
                <img src="img/5-apartment-floor-plan-2.jpg">
            </div>
        </section>
    </div>
</body>

</html>
